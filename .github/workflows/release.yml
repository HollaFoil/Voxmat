name: Build & Release

# Push a version tag to build all platforms and publish a GitHub Release:
#     git tag v0.1.0 && git push origin v0.1.0
# Or run manually (Actions tab) to build artifacts without releasing.
on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}

permissions:
  contents: write          # needed to create the Release

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: windows-latest, name: windows }
          - { os: ubuntu-latest,  name: linux }
          - { os: macos-latest,   name: macos }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt pyinstaller

      # PySide6 needs these system libraries to import during the build on Linux.
      - name: Install Linux GL libraries
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libegl1 libgl1 libxkbcommon0 libdbus-1-3

      - name: Build
        run: pyinstaller voxmat.spec

      - name: Package
        shell: bash
        run: python -c "import shutil; shutil.make_archive('Voxmat-${{ matrix.name }}', 'zip', 'dist', 'Voxmat')"

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: Voxmat-${{ matrix.name }}
          path: Voxmat-${{ matrix.name }}.zip

      - name: Attach to release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: Voxmat-${{ matrix.name }}.zip
